<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CityU ITC Internship Tracker</title>
    <script>
      var repoName = 'ITC-CityU-Internship-Dashboard-Management'
      var path = window.location.pathname
      var route = path.split('/' + repoName)[1] || '/'

      window.location.replace(
        window.location.origin + '/' + repoName + '/#' + route,
      )
    </script>
  </head>
  <body></body>
</html>
